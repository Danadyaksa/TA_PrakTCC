steps:
  # Step 1: Install dependencies
  - name: "node:22"
    entrypoint: npm
    args: ["ci"]
    dir: "web-hrd"

  # Step 2: Build Next.js — inject NEXT_PUBLIC_API_URL langsung saat build
  - name: "node:22"
    entrypoint: npm
    args: ["run", "build"]
    dir: "web-hrd"
    env:
      - "NEXT_PUBLIC_API_URL=$_BACKEND_URL/api"
      - "NODE_ENV=production"

  # Step 3: Update app.yaml dengan URL backend yang benar (untuk runtime env)
  - name: "bash"
    args:
      - "-c"
      - |
        sed -i "s|REPLACE_WITH_BACKEND_URL|${_BACKEND_URL}|g" web-hrd/app.yaml

  # Step 4: Deploy ke App Engine
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - app
      - deploy
      - web-hrd/app.yaml
      - --quiet
      - --project=$PROJECT_ID

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _BACKEND_URL: "https://presensi-backend-820401822458.asia-southeast2.run.app"
