steps:
  # Step 1: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "asia-southeast2-docker.pkg.dev/$PROJECT_ID/presensi/backend:$SHORT_SHA"
      - -t
      - "asia-southeast2-docker.pkg.dev/$PROJECT_ID/presensi/backend:latest"
      - .
    dir: "backend-api"

  # Step 2: Push image ke Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "asia-southeast2-docker.pkg.dev/$PROJECT_ID/presensi/backend:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "asia-southeast2-docker.pkg.dev/$PROJECT_ID/presensi/backend:latest"

  # Step 3: Deploy ke Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - presensi-backend
      - --image=asia-southeast2-docker.pkg.dev/$PROJECT_ID/presensi/backend:$SHORT_SHA
      - --region=asia-southeast2
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --set-env-vars=NODE_ENV=production
      - --set-secrets=DB_USER=DB_USER:latest,DB_PASSWORD=DB_PASSWORD:latest,DB_NAME=DB_NAME:latest,DB_HOST=DB_HOST:latest,DB_PORT=DB_PORT:latest,JWT_SECRET=JWT_SECRET:latest,/app/firebase-config.json=FIREBASE_CONFIG:latest

images:
  - "asia-southeast2-docker.pkg.dev/$PROJECT_ID/presensi/backend:$SHORT_SHA"
  - "asia-southeast2-docker.pkg.dev/$PROJECT_ID/presensi/backend:latest"

options:
  logging: CLOUD_LOGGING_ONLY
