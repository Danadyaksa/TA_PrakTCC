runtime: nodejs20

env: standard

instance_class: F2

entrypoint: node .next/standalone/server.js

env_variables:
  NODE_ENV: "production"
  PORT: "8080"
  # Ganti dengan URL Cloud Run backend yang sudah di-deploy
  NEXT_PUBLIC_API_URL: "https://presensi-backend-XXXX-as.a.run.app/api"

handlers:
  - url: /.*
    script: auto
    secure: always

automatic_scaling:
  min_instances: 0
  max_instances: 3

skip_files:
  - ^node_modules/
  - ^\.git/
  - ^\.next/cache/
  - ^\.env\.local$
  - ^\.env\*\.local$
  - ^README\.md$
