runtime: nodejs20

env: standard

instance_class: F2

entrypoint: npm start -- -p 8080

env_variables:
  NODE_ENV: "production"
  NEXT_PUBLIC_API_URL: "https://REPLACE_WITH_BACKEND_URL/api"

automatic_scaling:
  min_idle_instances: automatic
  max_idle_instances: automatic
  min_pending_latency: automatic
  max_pending_latency: automatic
  max_instances: 3
